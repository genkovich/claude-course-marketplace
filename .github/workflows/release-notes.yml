name: release-notes
on:
  push:
    tags: ['v*']

jobs:
  validate:
    uses: ./.github/workflows/validate-plugins.yaml
    secrets: inherit

  generate:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Claude Code CLI (native, stable channel)
        run: |
          curl -fsSL https://claude.ai/install.sh | bash -s stable
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Generate release notes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          PROMPT="$(cat .github/prompts/generate-release-notes.md)"
          SCHEMA="$(cat .github/prompts/release-notes.schema.json)"

          RESPONSE="$(claude -p "$PROMPT" \
            --allowed-tools "Bash(git log *)" "Read(docs/**)" "Edit(docs/**)" \
            --model claude-haiku-4-5 \
            --output-format json \
            --json-schema "$SCHEMA" \
            --max-turns 6)"

          RESULT_OBJ=$(echo "$RESPONSE" | jq -c '
            if type == "array"
            then (map(select(.type == "result")) | last // {})
            else .
            end
          ')

          IS_ERROR=$(echo "$RESULT_OBJ" | jq -r '.is_error // false')
          COST=$(echo "$RESULT_OBJ" | jq -r '.total_cost_usd // "n/a"')
          TURNS=$(echo "$RESULT_OBJ" | jq -r '.num_turns // "n/a"')
          echo "[claude] cost=\$${COST} turns=${TURNS} is_error=${IS_ERROR}"

          if [[ "$IS_ERROR" == "true" ]]; then
            echo "[claude] agent reported an error — raw response below" >&2
            echo "$RESPONSE" >&2
            exit 1
          fi

          echo "$RESULT_OBJ" | jq '
            if (.structured_output // null) != null
            then .structured_output
            else (.result as $r | try ($r | fromjson) catch $r)
            end
          ' > /tmp/release-notes.json

          {
            echo "## ${TAG#v} — $(jq -r '.release_date' /tmp/release-notes.json)"
            echo
            jq -r '
              .sections[]?
              | "### " + .title, "",
                (.items[]? | "- " + .),
                ""
            ' /tmp/release-notes.json
          } > /tmp/release-body.md

          {
            echo "Automated release notes for **$TAG**, generated by the \`release-notes\` workflow."
            echo
            echo "## What changed"
            echo
            cat /tmp/release-body.md
            echo
            echo "---"
            echo
            echo "Review the \`docs/CHANGELOG.md\` diff in this PR. After merge, publish the draft GitHub Release \`$TAG\` (created alongside this PR)."
          } > /tmp/pr-body.md

          echo "--- changelog diff ---"
          git diff -- docs/CHANGELOG.md

      - name: Open PR + draft Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BRANCH="release-notes/$TAG"
          git checkout -b "$BRANCH"
          git -c user.email=actions@github.com -c user.name='github-actions[bot]' \
            commit -am "chore: changelog for $TAG"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: changelog for $TAG" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"

          gh release create "$TAG" \
            --draft \
            --title "$TAG" \
            --notes-file /tmp/release-body.md
